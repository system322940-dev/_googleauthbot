<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>認証完了 - GoogleAuthBot</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; max-width: 450px; width: 100%; }
        .icon { font-size: 48px; color: #2ECC71; margin-bottom: 20px; }
        h1 { color: #2C3E50; font-size: 24px; margin-bottom: 10px; }
        p { color: #7F8C8D; font-size: 16px; line-height: 1.5; margin-bottom: 30px; }
        .btn { display: inline-block; background-color: #5865F2; color: white; padding: 12px 30px; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 15px; transition: background 0.2s; }
        .btn:hover { background-color: #4752C4; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✓</div>
        <h1>認証が完了しました！</h1>
        <p>Googleアカウントの連携と条件チェックが正常に成功しました。Discordサーバーに戻ってロールが付与されているか確認してください。</p>
        <p style="font-size: 13px; color: #bdc3c7;">※このウィンドウは閉じても大丈夫です。</p>
        <a href="https://discord.com/app" class="btn">Discordを開く</a>
    </div>
</body>
</html>
